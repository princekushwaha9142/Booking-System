services:
  - type: web
    name: booking-system-api
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: booking-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: REDIS_URL
        value: redis://localhost:6379/0

databases:
  - name: booking-postgres
    databaseName: booking_db
    user: postgres
    plan: free
    region: singapore